<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sushi Co — Loyalty Rewards Variants</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Shell ── */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
  background: #111; color: #fff; min-height: 100vh;
}

/* ── Toolbar ── */
.toolbar {
  position: sticky; top: 0; z-index: 1000;
  background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
  padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.toolbar-logo { display:flex; align-items:center; gap:8px; }
.toolbar-logo img { height: 24px; }
.toolbar-label { font-size: 10px; color: #555; font-style: italic; }
.tbar-sep { width: 1px; height: 20px; background: #333; }
.toggle-group { display: flex; gap: 2px; background: #111; border-radius: 9px; padding: 3px; }
.toggle-group button {
  padding: 5px 14px; border: none; border-radius: 6px; cursor: pointer;
  font-size: 12px; font-weight: 600; color: #666; background: transparent; transition: all .15s;
  white-space: nowrap;
}
.toggle-group button.active { color: #fff; }
.toggle-group.variant button.active { background: #cc1a2e; }
.toggle-group.view button.active { background: #333; }
.toggle-group.state button.active { background: #1a5c35; }

.config-pills { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.config-pills label { font-size: 10px; color: #555; }
.cpill {
  display: flex; align-items: center; gap: 4px; cursor: pointer;
  background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 3px 10px 3px 5px;
}
.cpill input { display: none; }
.cpill .dot { width: 12px; height: 12px; border-radius: 50%; background: #333; transition: background .15s; flex-shrink: 0; }
.cpill input:checked + .dot { background: #cc1a2e; }
.cpill span { font-size: 10px; color: #666; }
.cpill input:checked ~ span { color: #ddd; }

/* ── Frames ── */
.stage { display: flex; justify-content: center; gap: 24px; padding: 20px 16px; align-items: flex-start; }

.desktop-wrap {
  width: 100%; max-width: 1140px; border-radius: 10px; overflow: hidden;
  box-shadow: 0 16px 60px rgba(0,0,0,.7);
}
.browser-chrome { background: #e0e0e6; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
.chrome-dots { display: flex; gap: 5px; }
.chrome-dots span { width: 10px; height: 10px; border-radius: 50%; }
.chrome-dots span:nth-child(1){background:#ff5f57}
.chrome-dots span:nth-child(2){background:#febc2e}
.chrome-dots span:nth-child(3){background:#28c840}
.chrome-url { flex:1; background:#fff; border-radius:5px; padding:3px 10px; font-size:11px; color:#666; }

.mobile-wrap { width: 380px; flex-shrink: 0; display: none; }
.mobile-wrap.show { display: block; }
.mobile-shell { background:#1c1c1e; border-radius:40px; padding:10px; box-shadow:0 16px 50px rgba(0,0,0,.8),inset 0 0 0 1px #333; }
.mobile-notch { height:26px; width:110px; background:#000; border-radius:14px; margin:0 auto 8px; display:flex; align-items:center; padding: 0 14px; }
.mobile-notch-time { font-size:10px; color:#fff; font-weight:600; }
.mobile-scroll { border-radius:30px; overflow:hidden; overflow-y:auto; max-height:760px; -webkit-overflow-scrolling:touch; }

/* View modes */
body.desktop-only .mobile-wrap { display: none !important; }
body.mobile-only .desktop-wrap { display: none; }
body.mobile-only .mobile-wrap { display: block; }
body.split-view .desktop-wrap { max-width: 720px; }
body.split-view .mobile-wrap { display: block; }

/* ────────────────────────────────────────────────
   SHARED SHOW/HIDE RULES (same for all variants)
   ──────────────────────────────────────────────── */
[data-section="tiers"] { display: none; }
[data-section="bonus-time"] { display: none; }
[data-section="bonus-product"] { display: none; }
.cfg-tiers [data-section="tiers"] { display: block; }
.cfg-bonus-time [data-section="bonus-time"] { display: block; }
.cfg-bonus-product [data-section="bonus-product"] { display: block; }
.cfg-tiers .grid-tiers { display: flex !important; }
.cfg-bonus-time .grid-bonustime { display: block !important; }
.cfg-bonus-product .grid-bonusprod { display: block !important; }

.auth-loggedout .show-auth { display: none !important; }
.auth-loggedin .show-guest { display: none !important; }
.auth-loggedout .tier-earn-badge { display: none !important; }
.auth-loggedout .current-tag { display: none !important; }
.auth-loggedout .tier-hl { border-color: #e0e0e0 !important; box-shadow: none !important; background: #fff !important; }
.auth-loggedout .balance-zone { display: none !important; }

/* ────────────────────────────────────────────────
   SUSHI CO NAVBAR (shared across all variants)
   ──────────────────────────────────────────────── */
.sc-nav {
  background: #fff; border-bottom: 1px solid #f0f0f0;
  padding: 0 24px; height: 72px;
  display: flex; align-items: center; justify-content: space-between;
}
.sc-nav-logo { height: 52px; display: block; }
.sc-nav-right { display: flex; align-items: center; gap: 12px; }
.sc-nav-feedback { display:flex; align-items:center; gap:5px; font-size:13px; color:#333; background:none; border:none; cursor:pointer; }
.sc-nav-account { background: #cc1a2e; color: #fff; border: none; border-radius: 20px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; display:flex; align-items:center; gap:5px; }

/* Mobile sc-nav */
.mobile-scroll .sc-nav { padding: 0 12px; height: 56px; }
.mobile-scroll .sc-nav-logo { height: 36px; }
.mobile-scroll .sc-nav-feedback { display: none; }
.mobile-scroll .sc-nav-account { padding: 6px 12px; font-size: 12px; }

/* ════════════════════════════════════════════════════════════════
   VARIANT A — "Classic sidebar"
   ════════════════════════════════════════════════════════════════ */
.va {
  font-family: inherit; background: #f5f5f5;
  --brand: #cc1a2e; --text: #111; --muted: #6b7280; --border: #e5e7eb;
}

.va .hero-img {
  width:100%; height:200px;
  background-image: url('https://test-assets.andromedapos.com/AME3zrDKFkGsyayx5TVznA/4/default');
  background-size: cover; background-position: center top;
  position:relative; overflow:hidden;
}
.va .hero-img::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(to bottom, rgba(0,0,0,0) 40%, rgba(0,0,0,.3) 100%);
}

.va .hero-strip {
  background: #000; padding: 20px 28px;
  display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: center;
}
.va .hero-strip-left .prog-name { font-size: 22px; font-weight: 900; color: #fff; letter-spacing:-.3px; }
.va .hero-strip-left .prog-tag { font-size: 12px; color: rgba(255,255,255,.5); margin:4px 0 12px; }
.va .hero-pills { display:flex; gap:6px; flex-wrap:wrap; }
.va .hp { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:20px; padding:4px 10px; font-size:11px; color:rgba(255,255,255,.7); }
.va .hp b { color:#fff; }

.va .balance-zone {
  background: var(--brand); border-radius:14px; padding:16px 20px; min-width:190px; text-align:center;
  box-shadow: 0 6px 20px rgba(204,26,46,.35);
}
.va .bz-lbl { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,.7); margin-bottom:3px; }
.va .bz-pts { font-size:36px; font-weight:900; color:#fff; line-height:1; }
.va .bz-unit { font-size:11px; color:rgba(255,255,255,.8); font-weight:600; }
.va .bz-bar { height:4px; background:rgba(255,255,255,.2); border-radius:2px; overflow:hidden; margin:8px 0 4px; }
.va .bz-fill { height:100%; background:#fff; border-radius:2px; }
.va .bz-next { font-size:9px; color:rgba(255,255,255,.7); }

.va .join-strip { display:none; padding:14px 20px; background:#fff8f8; border:1px solid #fca5a5; border-radius:12px; margin:14px 20px; gap:14px; align-items:center; }
.va .js-icon { font-size:28px; flex-shrink:0; }
.va .js-h { font-size:14px; font-weight:800; color:var(--text); }
.va .js-p { font-size:12px; color:#6b7280; }
.va .js-btns { display:flex; gap:8px; margin-top:8px; }
.va .btn-primary { background:var(--brand); color:#fff; border:none; border-radius:20px; padding:8px 18px; font-size:12px; font-weight:700; cursor:pointer; }
.va .btn-ghost { background:transparent; border:1px solid #e5e7eb; border-radius:20px; padding:8px 18px; font-size:12px; font-weight:600; color:var(--text); cursor:pointer; }

.va .body { max-width:1100px; margin:0 auto; padding:20px; display:grid; grid-template-columns:1fr 280px; gap:20px; align-items:start; }
.va .card { background:#fff; border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.va .card-head { display:flex; align-items:center; gap:10px; padding:14px 18px 10px; border-bottom:1px solid var(--border); }
.va .card-ico { width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:15px; }
.va .card-ico.earn { background:#fce7e9; }
.va .card-ico.spend { background:#d1fae5; }
.va .card-ico.tiers { background:#fce7f3; }
.va .card-ico.bonus { background:#dbeafe; }
.va .card-ico.activity { background:#f3f4f6; }
.va .card-title { font-size:14px; font-weight:700; color:var(--text); }
.va .card-sub { font-size:11px; color:var(--muted); }
.va .card-body { padding:16px 18px; }

.va .earn-row { display:flex; align-items:center; gap:10px; background:#fff5f5; border:1px solid #fca5a5; border-radius:10px; padding:14px 16px; margin-bottom:12px; }
.va .earn-big { font-size:30px; font-weight:900; color:var(--brand); }
.va .earn-eq { font-size:12px; font-weight:700; color:var(--text); flex:1; }
.va .earn-note { font-size:11px; color:var(--muted); line-height:1.4; flex:2; }
.va .welcome-badge { background:#fff5f5; border:1px solid #fca5a5; border-radius:9px; padding:10px 12px; font-size:11px; color:#991b1b; display:flex; gap:7px; align-items:center; }
.va .tier-earn-badge { background:#fff5f5; border:1px solid #fca5a5; border-radius:9px; padding:10px 12px; font-size:11px; color:#991b1b; display:flex; gap:7px; align-items:center; }

.va .tier-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.va .tier-card { border:2px solid var(--border); border-radius:10px; padding:14px; text-align:center; position:relative; }
.va .tier-hl { border-color:var(--brand); background:#fff5f5; box-shadow:0 0 0 3px rgba(204,26,46,.1); }
.va .tier-icon { font-size:22px; margin-bottom:5px; }
.va .tier-name { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
.va .tier-q { font-size:10px; color:var(--muted); margin-bottom:8px; line-height:1.3; }
.va .tier-perks { font-size:10px; color:var(--muted); line-height:1.8; text-align:left; }
.va .tier-perks div::before { content:'✓ '; color:#16a34a; }
.va .current-tag { position:absolute; top:5px; right:5px; background:var(--brand); color:#fff; font-size:8px; font-weight:800; text-transform:uppercase; padding:2px 6px; border-radius:8px; }

.va .voucher-card { display:flex; align-items:center; gap:12px; background:#000; border-radius:10px; padding:14px 18px; margin-bottom:12px; }
.va .vc-pts { background:rgba(255,255,255,.1); border-radius:8px; padding:8px 12px; text-align:center; }
.va .vc-num { font-size:20px; font-weight:900; color:#fff; }
.va .vc-lab { font-size:9px; color:rgba(255,255,255,.5); text-transform:uppercase; }
.va .vc-arrow { font-size:14px; color:rgba(255,255,255,.3); }
.va .vc-val { background:var(--brand); border-radius:8px; padding:8px 12px; text-align:center; }
.va .vc-desc { font-size:11px; color:rgba(255,255,255,.6); flex:1; line-height:1.4; }
.va .prod-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.va .prod-item { border:1px solid var(--border); border-radius:9px; overflow:hidden; position:relative; }
.va .prod-img { aspect-ratio:1; background:#f9f9f9; display:flex; align-items:center; justify-content:center; font-size:26px; overflow:hidden; }
.va .prod-img img { width:100%; height:100%; object-fit:cover; display:block; }
.va .prod-info { padding:8px; }
.va .prod-name { font-size:10px; font-weight:700; color:var(--text); margin-bottom:3px; line-height:1.3; }
.va .prod-pts { display:inline-block; background:var(--brand); color:#fff; border-radius:9px; padding:2px 7px; font-size:10px; font-weight:800; }

.va .btime-list { display:flex; flex-direction:column; gap:9px; }
.va .btime-item { display:flex; align-items:center; gap:10px; background:#eff6ff; border:1px solid #bfdbfe; border-radius:9px; padding:11px 14px; }
.va .btime-ico { width:32px; height:32px; border-radius:50%; background:#1d4ed8; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.va .btime-days { font-size:12px; font-weight:700; color:#1e40af; }
.va .btime-hours { font-size:11px; color:#3b82f6; }
.va .btime-mult { display:inline-block; background:#1d4ed8; color:#fff; border-radius:8px; padding:2px 7px; font-size:10px; font-weight:800; margin-top:2px; }
.va .bprod-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:9px; }
.va .bprod-item { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:9px; padding:10px; text-align:center; overflow:hidden; }
.va .bprod-ico { font-size:22px; margin-bottom:4px; }
.va .bprod-img { width:100%; aspect-ratio:16/9; object-fit:cover; border-radius:6px; margin-bottom:6px; display:block; }
.va .bprod-name { font-size:10px; font-weight:700; color:var(--text); margin-bottom:4px; }
.va .bprod-pts { display:inline-block; background:#16a34a; color:#fff; border-radius:8px; padding:2px 7px; font-size:10px; font-weight:800; }

.va .act-list {}
.va .act-row { display:grid; grid-template-columns:32px 1fr auto; gap:10px; align-items:center; padding:11px 0; border-bottom:1px solid var(--border); }
.va .act-row:last-child { border-bottom:none; }
.va .act-ico { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.va .act-ico.earn { background:#fce7e9; }
.va .act-ico.spend { background:#fee2e2; }
.va .act-ico.bonus { background:#dbeafe; }
.va .act-desc { font-size:12px; font-weight:600; color:var(--text); }
.va .act-meta { font-size:10px; color:var(--muted); margin-top:1px; }
.va .pts-earn { font-size:13px; font-weight:800; color:#16a34a; }
.va .pts-spend { font-size:13px; font-weight:800; color:var(--brand); }
.va .pts-bonus { font-size:13px; font-weight:800; color:#2563eb; }
.va .act-bal { font-size:10px; color:var(--muted); text-align:right; }
.va .act-guest { text-align:center; padding:24px; color:var(--muted); font-size:12px; }

.va .sidebar {}
.va .sb-bal { background:var(--brand); border-radius:12px; padding:18px; margin-bottom:12px; box-shadow:0 4px 16px rgba(204,26,46,.25); }
.va .sb-lbl { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,.7); }
.va .sb-pts { font-size:34px; font-weight:900; color:#fff; line-height:1.1; }
.va .sb-unit { font-size:11px; color:rgba(255,255,255,.8); font-weight:600; margin-bottom:10px; }
.va .sb-bar { height:4px; background:rgba(255,255,255,.2); border-radius:2px; overflow:hidden; margin:8px 0 4px; }
.va .sb-fill { height:100%; background:#fff; border-radius:2px; }
.va .sb-cta { display:block; background:#fff; color:var(--brand); border:none; border-radius:9px; padding:11px; font-size:12px; font-weight:800; cursor:pointer; margin-top:12px; text-align:center; }

.va .sb-signup { display:none; background:#fff; border:1px solid var(--border); border-radius:12px; padding:18px; text-align:center; margin-bottom:12px; }
.va .sb-signup .ss-icon { font-size:30px; margin-bottom:6px; }
.va .sb-signup h3 { font-size:14px; font-weight:800; color:var(--text); margin-bottom:5px; }
.va .sb-signup p { font-size:11px; color:var(--muted); margin-bottom:12px; }
.va .sb-signup .btn-primary { width:100%; padding:11px; border-radius:9px; }

.va .sb-how { background:#fff; border:1px solid var(--border); border-radius:12px; padding:14px; }
.va .sb-how h4 { font-size:12px; font-weight:700; color:var(--text); margin-bottom:8px; }
.va .sh-row { display:flex; gap:7px; align-items:flex-start; padding:7px 0; border-bottom:1px solid var(--border); font-size:11px; color:var(--muted); }
.va .sh-row:last-child { border-bottom:none; }
.va .sh-row strong { color:var(--text); }
.va .sh-row a { color:var(--brand); font-weight:600; text-decoration:none; }

.mobile-scroll .va .hero-strip { grid-template-columns:1fr; }
.mobile-scroll .va .balance-zone { text-align:left; display:flex; align-items:center; gap:14px; }
.mobile-scroll .va .bz-pts { font-size:28px; }
.mobile-scroll .va .body { grid-template-columns:1fr; padding:12px; }
.mobile-scroll .va .sidebar { display:none; }
.mobile-scroll .va .tier-grid { grid-template-columns:1fr; }
.mobile-scroll .va .prod-grid { grid-template-columns:repeat(2,1fr); }
.mobile-scroll .va .bprod-grid { grid-template-columns:repeat(2,1fr); }


/* ════════════════════════════════════════════════════════════════
   VARIANT B — "Dashboard grid"
   ════════════════════════════════════════════════════════════════ */
.vb {
  font-family: inherit; background: #f5f5f5;
  --brand: #cc1a2e; --text: #111; --muted: #777; --border: #e8e8ec; --card: #fff;
}

.vb .hero-img {
  width:100%; height:180px;
  background-image: url('https://test-assets.andromedapos.com/AME3zrDKFkGsyayx5TVznA/4/default');

.vb .jb-btns .btn-p { background: var(--brand); color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: 12px; font-weight: 700; cursor: pointer; }

.vb .dash-row.r3 { grid-template-columns: 2fr 1fr; }

.vb .dcard { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
.vb .dc-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px; border-bottom: 1px solid var(--border); }
.vb .dc-head-left { display: flex; align-items: center; gap: 10px; }
.vb .dc-ico { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.vb .dc-ico.earn { background: #fce7e9; }
.vb .dc-ico.spend { background: #d1fae5; }
.vb .dc-ico.tiers { background: #fce7f3; }
.vb .dc-ico.bonus { background: #dbeafe; }
.vb .dc-ico.activity { background: #f3f4f6; }

// ── State ────────────────────────────────────────────────────────
let currentVariant = 'a';

function render() {
  const html = currentVariant === 'a' ? htmlA() : currentVariant === 'b' ? htmlB() : htmlC();
  document.getElementById('page-desktop').innerHTML = html;
  document.getElementById('page-mobile').innerHTML = html;
  sync();
}

function sync() {
  const bc = document.body.className;
  const loggedIn = bc.includes('logged-in');
  const cfgTiers = bc.includes('cfg-tiers');
  const cfgTime = bc.includes('cfg-bonus-time');
  const cfgProd = bc.includes('cfg-bonus-product');
  ['page-desktop','page-mobile'].forEach(id => {
    const p = document.getElementById(id);
    if (!p) return;
    p.classList.toggle('auth-loggedin', loggedIn);
    p.classList.toggle('auth-loggedout', !loggedIn);
    p.classList.toggle('cfg-tiers', cfgTiers);
    p.classList.toggle('cfg-bonus-time', cfgTime);
    p.classList.toggle('cfg-bonus-product', cfgProd);
  });
}

function setVariant(v) {
  currentVariant = v;
  ['a','b','c'].forEach(x => document.getElementById('btn-v'+x)?.classList.remove('active'));
  document.getElementById('btn-v'+v)?.classList.add('active');
  render();
}

function setView(mode) {
  document.body.className = document.body.className.replace(/\b(desktop-only|mobile-only|split-view)\b/g,'').trim();
  document.body.classList.add(mode);
  ['btn-desktop','btn-split','btn-mobile'].forEach(b => document.getElementById(b)?.classList.remove('active'));
  const map = {'desktop-only':'btn-desktop','split-view':'btn-split','mobile-only':'btn-mobile'};
  document.getElementById(map[mode])?.classList.add('active');
}

function setState(s) {
  document.body.className = document.body.className.replace(/\b(logged-in|logged-out)\b/g,'').trim();
  document.body.classList.add(s === 'loggedin' ? 'logged-in' : 'logged-out');
  document.getElementById('btn-in')?.classList.toggle('active', s==='loggedin');
  document.getElementById('btn-out')?.classList.toggle('active', s==='loggedout');
  sync();
}

function toggleCfg(c, on) {
  document.body.classList.toggle('cfg-'+c, on);
  sync();
}

render();
</script>
